<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>더힘 일일보고</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

:root{
  --ink:#2C3E2D;
  --ink2:#4A5D4B;
  --ink3:#7A8F7B;
  --paper:#FAF8F3;
  --paper2:#F3EFE6;
  --paper3:#EDE7D9;
  --brush-blue:#7BA7BC;
  --brush-green:#8FAF8A;
  --brush-rose:#C4907A;
  --brush-gold:#C4A87A;
  --wash:#E8E0D0;
  --line:#D4C9B5;
}

body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--paper);
  color:var(--ink);
  font-size:16px;
  min-height:100vh;
  /* 수채화 배경 질감 */
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(123,167,188,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 90%, rgba(143,175,138,.06) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 40%, rgba(196,168,122,.05) 0%, transparent 40%);
}

/* ── 페이지 ── */
.page{display:none;min-height:100vh;padding-bottom:100px}
.page.on{display:block}

/* ══════════════════════════
   수채화 헤더
══════════════════════════ */
.wc-header{
  padding:28px 24px 20px;
  background:linear-gradient(160deg, rgba(123,167,188,.15) 0%, rgba(143,175,138,.1) 50%, transparent 100%);
  border-bottom:1px solid var(--line);
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(8px);
}
.wc-logo{
  font-family:'Noto Serif KR',serif;
  font-size:13px;font-weight:400;
  color:var(--ink3);letter-spacing:2px;
  margin-bottom:4px;
}
.wc-title{
  font-family:'Noto Serif KR',serif;
  font-size:20px;font-weight:500;
  color:var(--ink);letter-spacing:-0.5px;
}
.wc-date{font-size:12px;color:var(--ink3);margin-top:3px;letter-spacing:.5px}

/* ── 붓터치 구분선 ── */
.brush-line{
  height:2px;
  background:linear-gradient(90deg,transparent,var(--brush-blue),var(--brush-green),transparent);
  opacity:.4;
  margin:0;
}

/* ══════════════════════════
   PAGE 0 — 직원 선택
══════════════════════════ */
#p0{
  background:
    radial-gradient(ellipse at 30% 20%, rgba(123,167,188,.12) 0%, transparent 60%),
    radial-gradient(ellipse at 70% 80%, rgba(143,175,138,.10) 0%, transparent 60%),
    var(--paper);
  padding-bottom:40px;
}

.p0-hero{padding:40px 24px 28px;text-align:center}
.p0-brush{font-size:48px;margin-bottom:16px;opacity:.85}
.p0-title{
  font-family:'Noto Serif KR',serif;
  font-size:26px;font-weight:500;color:var(--ink);
  margin-bottom:8px;line-height:1.4;
}
.p0-sub{font-size:14px;color:var(--ink3);line-height:1.7}

.p0-label{
  font-size:11px;font-weight:700;color:var(--ink3);
  letter-spacing:2px;text-transform:uppercase;
  padding:0 24px;margin-bottom:12px;
}

.staff-list{padding:0 20px;display:flex;flex-direction:column;gap:8px;max-height:55vh;overflow-y:auto}
.staff-card{
  background:rgba(255,255,255,.7);
  border:1px solid var(--line);
  border-radius:14px;padding:14px 18px;
  cursor:pointer;transition:all .2s;
  display:flex;align-items:center;gap:14px;
  backdrop-filter:blur(4px);
}
.staff-card:hover{background:rgba(255,255,255,.95);border-color:var(--brush-blue);transform:translateX(3px)}
.staff-card.on{
  background:linear-gradient(135deg,rgba(123,167,188,.15),rgba(143,175,138,.12));
  border-color:var(--brush-green);
}
.staff-initial{
  width:42px;height:42px;border-radius:50%;
  background:linear-gradient(135deg,var(--brush-blue),var(--brush-green));
  color:#fff;font-size:16px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-family:'Noto Serif KR',serif;
}
.staff-info .sname{font-size:15px;font-weight:500;color:var(--ink)}
.staff-info .sdept{font-size:12px;color:var(--ink3);margin-top:2px}

.p0-btn{
  margin:20px 20px 0;
  width:calc(100% - 40px);height:54px;
  border-radius:27px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--brush-blue),var(--brush-green));
  color:#fff;font-size:16px;font-weight:500;
  letter-spacing:.5px;transition:all .2s;
  font-family:'Noto Sans KR',sans-serif;
}
.p0-btn:active{transform:scale(.97);opacity:.9}

/* ══════════════════════════
   PAGE 1 — 입력
══════════════════════════ */
#p1{background:
  radial-gradient(ellipse at 85% 15%, rgba(196,168,122,.08) 0%, transparent 50%),
  var(--paper);}

/* 사용자 정보 바 */
.user-bar{
  display:flex;align-items:center;gap:12px;
  padding:16px 20px;
  border-bottom:1px solid var(--line);
  background:rgba(250,248,243,.9);
  backdrop-filter:blur(8px);
  position:sticky;top:0;z-index:100;
}
.user-dot{
  width:36px;height:36px;border-radius:50%;
  background:linear-gradient(135deg,var(--brush-blue),var(--brush-green));
  color:#fff;font-size:14px;font-weight:600;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;cursor:pointer;font-family:'Noto Serif KR',serif;
}
.user-info{flex:1}
.user-name{font-size:14px;font-weight:500;color:var(--ink)}
.user-date{font-size:11px;color:var(--ink3);margin-top:1px}

/* ── 컨텍스트 카드 ── */
.ctx-card{
  background:rgba(255,255,255,.65);border:1px solid var(--line);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;
  backdrop-filter:blur(4px);
}
.ctx-head{
  font-size:12px;font-weight:700;color:var(--ink3);
  display:flex;align-items:center;gap:6px;margin-bottom:8px;
  letter-spacing:.5px;
}
.ctx-body{display:flex;flex-direction:column;gap:5px}
.ctx-row{
  font-size:13px;color:var(--ink2);line-height:1.6;
  padding:5px 8px;background:rgba(250,248,243,.7);
  border-radius:7px;border-left:2px solid var(--line);
}
.ctx-row.blue{border-left-color:var(--brush-blue)}
.ctx-row.green{border-left-color:var(--brush-green)}
.ctx-row.rose{border-left-color:var(--brush-rose)}
.ctx-row.gold{border-left-color:var(--brush-gold)}
.ctx-time{font-size:11px;color:var(--ink3);margin-right:5px}

/* ── 섹션 제목 ── */
.sec-title{
  font-family:'Noto Serif KR',serif;
  font-size:13px;font-weight:400;
  color:var(--ink3);letter-spacing:1px;
  padding:20px 20px 10px;
  display:flex;align-items:center;gap:8px;
}
.sec-title::after{
  content:'';flex:1;height:1px;
  background:linear-gradient(90deg,var(--line),transparent);
}

/* 텍스트 입력 */
.input-wrap{padding:0 20px}
.main-textarea{
  width:100%;min-height:220px;
  border:1.5px solid var(--line);
  border-radius:16px;padding:18px;
  font-size:16px;font-family:'Noto Sans KR',sans-serif;
  background:rgba(255,255,255,.8);
  color:var(--ink);resize:none;line-height:1.8;
  transition:border-color .2s,box-shadow .2s;
  -webkit-appearance:none;
}
.main-textarea:focus{
  outline:none;
  border-color:var(--brush-blue);
  box-shadow:0 0 0 3px rgba(123,167,188,.12);
  background:rgba(255,255,255,.95);
}
.input-hint{
  font-size:11px;color:var(--ink3);
  margin-top:10px;padding:0 4px;line-height:1.7;
}

/* 음성 버튼 */
.voice-wrap{padding:12px 20px 0}
.voice-btn{
  display:flex;align-items:center;gap:10px;
  width:100%;padding:14px 18px;
  background:rgba(255,255,255,.7);
  border:1.5px solid var(--line);border-radius:14px;
  font-size:14px;font-weight:500;color:var(--ink2);
  cursor:pointer;transition:all .2s;
  font-family:'Noto Sans KR',sans-serif;
}
.voice-btn:hover{background:rgba(255,255,255,.95);border-color:var(--brush-rose)}
.voice-btn.rec{
  border-color:var(--brush-rose);
  background:rgba(196,144,122,.08);
  color:var(--brush-rose);
  animation:breathe 2s ease-in-out infinite;
}
@keyframes breathe{0%,100%{box-shadow:0 0 0 0 rgba(196,144,122,.3)}50%{box-shadow:0 0 0 8px rgba(196,144,122,0)}}
.voice-icon{font-size:20px;flex-shrink:0}

/* 파일 업로드 */
.upload-wrap{padding:12px 20px 0}
.upload-zone{
  border:1.5px dashed var(--line);
  border-radius:16px;padding:22px 18px;
  background:rgba(255,255,255,.5);
  cursor:pointer;transition:all .2s;text-align:center;
}
.upload-zone:hover{border-color:var(--brush-gold);background:rgba(255,255,255,.85)}
.upload-icon{font-size:28px;margin-bottom:8px;opacity:.7}
.upload-title{font-size:14px;font-weight:500;color:var(--ink2);margin-bottom:4px}
.upload-hint{font-size:11px;color:var(--ink3);line-height:1.6}
.file-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;justify-content:center}
.file-chip{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.9);border:1px solid var(--line);
  border-radius:20px;padding:5px 12px;font-size:12px;color:var(--ink2);
}
.chip-del{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:14px;padding:0;line-height:1}

/* 발송 버튼 */
.bottom-fixed{
  position:fixed;bottom:0;left:0;right:0;
  padding:14px 20px;
  background:linear-gradient(0deg,var(--paper) 60%,transparent);
}
.send-btn{
  width:100%;height:54px;border-radius:27px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--ink),var(--ink2));
  color:var(--paper);font-size:16px;font-weight:500;
  letter-spacing:.5px;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:8px;
  font-family:'Noto Sans KR',sans-serif;
}
.send-btn:active{transform:scale(.97);opacity:.9}

/* ══════════════════════════
   PAGE 2 — 보기 + 수정
══════════════════════════ */
#p2{background:
  radial-gradient(ellipse at 20% 80%, rgba(143,175,138,.08) 0%, transparent 50%),
  var(--paper);}

.p2-topbar{
  display:flex;align-items:center;gap:10px;
  padding:14px 20px;
  border-bottom:1px solid var(--line);
  background:rgba(250,248,243,.95);
  backdrop-filter:blur(8px);
  position:sticky;top:0;z-index:100;
}
.back-btn{
  background:none;border:none;color:var(--ink2);
  font-size:22px;cursor:pointer;padding:0;line-height:1;flex-shrink:0;
}
.p2-name{
  font-family:'Noto Serif KR',serif;
  font-size:15px;font-weight:500;color:var(--ink);flex:1;
}
.edit-btn{
  background:none;border:1px solid var(--line);
  border-radius:20px;padding:6px 14px;
  font-size:12px;font-weight:500;color:var(--ink2);
  cursor:pointer;transition:all .2s;
  font-family:'Noto Sans KR',sans-serif;
}
.edit-btn.active{border-color:var(--brush-blue);color:var(--brush-blue);background:rgba(123,167,188,.08)}

/* 분석 중 */
.loading-wrap{padding:60px 24px;text-align:center}
.loading-brush{font-size:44px;margin-bottom:16px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.loading-text{font-family:'Noto Serif KR',serif;font-size:18px;font-weight:400;color:var(--ink);margin-bottom:8px}
.loading-sub{font-size:13px;color:var(--ink3);line-height:1.7}

/* 보고서 섹션 카드 */
.report-wrap{padding:16px 20px}
.rep-card{
  background:rgba(255,255,255,.8);
  border:1px solid var(--line);border-radius:16px;
  overflow:hidden;margin-bottom:12px;
  backdrop-filter:blur(4px);
}
.rep-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;
  background:rgba(250,248,243,.8);
  border-bottom:1px solid var(--line);
}
.rep-label{
  font-size:11px;font-weight:700;color:var(--ink3);
  letter-spacing:1.5px;text-transform:uppercase;
}
.rep-edit{
  background:none;border:none;font-size:12px;
  color:var(--brush-blue);cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
}
.rep-body{padding:14px 16px}
.rep-text{font-size:15px;color:var(--ink);line-height:1.8}
.rep-textarea{
  width:100%;border:1.5px solid var(--brush-blue);border-radius:10px;
  padding:12px;font-size:15px;font-family:'Noto Sans KR',sans-serif;
  resize:none;line-height:1.8;background:var(--paper);color:var(--ink);
  display:none;
}
.rep-save{
  display:none;width:100%;height:40px;border-radius:10px;
  background:var(--brush-blue);color:#fff;
  border:none;cursor:pointer;font-size:13px;font-weight:500;
  margin-top:8px;font-family:'Noto Sans KR',sans-serif;
}
.rep-task{
  padding:8px 0;border-bottom:1px solid var(--paper3);
  font-size:14px;color:var(--ink);line-height:1.7;
}
.rep-task:last-child{border-bottom:none;padding-bottom:0}

/* AI 질문 카드 */
.ai-card{
  background:linear-gradient(135deg,rgba(196,168,122,.08),rgba(123,167,188,.06));
  border:1.5px solid var(--brush-gold);border-radius:16px;
  overflow:hidden;margin-bottom:12px;
}
.ai-head{
  padding:12px 16px;
  background:rgba(196,168,122,.1);
  border-bottom:1px solid rgba(196,168,122,.2);
  font-size:12px;font-weight:600;color:var(--brush-rose);
  display:flex;align-items:center;gap:6px;
}
.ai-body{padding:14px 16px}
.ai-question{font-size:14px;color:var(--ink);line-height:1.7;margin-bottom:12px}
.ai-input{
  width:100%;border:1.5px solid var(--line);border-radius:10px;
  padding:12px;font-size:15px;font-family:'Noto Sans KR',sans-serif;
  background:rgba(255,255,255,.8);color:var(--ink);
}
.ai-input:focus{outline:none;border-color:var(--brush-gold)}
.ai-submit{
  width:100%;height:42px;border-radius:10px;
  background:linear-gradient(135deg,var(--brush-gold),var(--brush-rose));
  color:#fff;border:none;cursor:pointer;
  font-size:14px;font-weight:500;margin-top:10px;
  font-family:'Noto Sans KR',sans-serif;
}

/* 하단 버튼 2개 */
.p2-bottom{
  position:fixed;bottom:0;left:0;right:0;
  padding:12px 20px;
  background:linear-gradient(0deg,var(--paper) 60%,transparent);
  display:flex;gap:10px;
}
.btn-sv{
  flex:1;height:50px;border-radius:25px;
  border:1.5px solid var(--line);
  background:rgba(255,255,255,.9);
  color:var(--ink2);font-size:15px;font-weight:500;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
}
.btn-sd{
  flex:2;height:50px;border-radius:25px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--ink),var(--ink2));
  color:var(--paper);font-size:15px;font-weight:500;
  font-family:'Noto Sans KR',sans-serif;
}

/* 완료 */
.done-wrap{padding:50px 24px;text-align:center}
.done-brush{font-size:52px;margin-bottom:16px}
.done-title{
  font-family:'Noto Serif KR',serif;
  font-size:22px;font-weight:500;color:var(--ink);margin-bottom:10px;
}
.done-desc{font-size:14px;color:var(--ink3);line-height:1.8;margin-bottom:28px}
.done-new{
  width:100%;height:50px;border-radius:25px;
  border:1.5px solid var(--line);background:transparent;
  color:var(--ink2);font-size:15px;font-weight:500;cursor:pointer;
  font-family:'Noto Sans KR',sans-serif;
}

/* 토스트 */
.toast{
  position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
  background:rgba(44,62,45,.9);color:var(--paper);
  padding:10px 20px;border-radius:20px;
  font-size:13px;opacity:0;transition:opacity .25s;
  z-index:999;white-space:nowrap;pointer-events:none;
  backdrop-filter:blur(8px);
}
.toast.on{opacity:1}
</style>
</head>
<body>

<!-- ══════════════════════════
     PAGE 0 — 직원 선택
══════════════════════════ -->
<div class="page on" id="p0">
  <div class="p0-hero">
    <div class="p0-brush">🖌️</div>
    <div class="p0-title">더힘이엔씨<br>일일보고</div>
    <div class="p0-sub" style="margin-top:8px">처음 한 번만 선택하면<br>다음부터 자동으로 시작됩니다</div>
  </div>

  <div class="p0-label">본인 선택</div>
  <div class="staff-list" id="staff-list"></div>
  <button class="p0-btn" onclick="completeSetup()">시작하기</button>
</div>

<!-- ══════════════════════════
     PAGE 1 — 입력
══════════════════════════ -->
<div class="page" id="p1">

  <div class="user-bar">
    <div class="user-dot" id="user-dot" onclick="resetProfile()">?</div>
    <div class="user-info">
      <div class="user-name" id="user-name">-</div>
      <div class="user-date" id="user-date">-</div>
    </div>
  </div>

  <!-- 컨텍스트 카드 -->
  <div id="ctx-area" style="padding:14px 20px 0">

    <!-- 오늘 일정 -->
    <div class="ctx-card" id="ctx-schedule" style="display:none">
      <div class="ctx-head">📅 <span>오늘 일정</span></div>
      <div class="ctx-body" id="ctx-schedule-body"></div>
    </div>

    <!-- 어제 보고 미완료 -->
    <div class="ctx-card" id="ctx-yesterday" style="display:none">
      <div class="ctx-head">📋 <span>어제 보고 요약</span></div>
      <div class="ctx-body" id="ctx-yesterday-body"></div>
    </div>

    <!-- 받은 지시사항 -->
    <div class="ctx-card" id="ctx-directive" style="display:none">
      <div class="ctx-head">📌 <span>미완료 지시사항</span></div>
      <div class="ctx-body" id="ctx-directive-body"></div>
    </div>

    <!-- 로딩 -->
    <div id="ctx-loading" style="text-align:center;padding:14px 0;font-size:13px;color:var(--ink3)">
      🌿 힘클로드가 오늘 컨텍스트를 가져오는 중...
    </div>

  </div>

  <div class="sec-title" style="margin-top:6px">오늘 업무</div>

  <div class="input-wrap">
    <textarea class="main-textarea" id="main-input" rows="8"
      placeholder="형식 없이 말하듯 쓰세요.

더케이 주간회의 다녀옴. 이용수요예측 반영 논의.
갤러리아 도면 검토 완료.
이지스 최광석 매니저한테 공문 보내야 함.
수송 심의 — 강중구 본부장 내일 직접 참석."></textarea>
    <div class="input-hint">💡 프로젝트명, 만난 사람, 요청사항 등 생각나는 대로 — 힘클로드가 정리합니다</div>
  </div>

  <div class="voice-wrap">
    <div class="voice-btn" id="voice-btn" onclick="toggleVoice()">
      <span class="voice-icon" id="voice-icon">🎤</span>
      <span id="voice-label">음성으로 말하기</span>
    </div>
  </div>

  <div class="upload-wrap">
    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-inp').click()">
      <div class="upload-icon">📎</div>
      <div class="upload-title">사진 · 파일 · 회의록 첨부</div>
      <div class="upload-hint">은행 거래내역 · 카드내역 · 회의록 · 사진<br>PDF · Excel · 이미지 모두 가능</div>
      <div class="file-chips" id="file-chips"></div>
    </div>
    <input type="file" id="file-inp" multiple
      accept="image/*,.pdf,.doc,.docx,.hwp,.xlsx,.xls,.txt,.mp3,.m4a,.wav"
      style="display:none" onchange="handleFiles(this)">
  </div>

  <div class="bottom-fixed">
    <button class="send-btn" onclick="doAnalyze()">
      <span>🤖</span><span>힘클로드에게 보내기</span>
    </button>
  </div>
</div>

<!-- ══════════════════════════
     PAGE 2 — 보기 + 수정
══════════════════════════ -->
<div class="page" id="p2">

  <div class="p2-topbar">
    <button class="back-btn" onclick="goPage('p1')">←</button>
    <div class="p2-name" id="p2-name">보고서 확인</div>
    <button class="edit-btn" id="edit-btn" onclick="toggleEdit()">수정</button>
  </div>

  <div id="p2-body">
    <!-- 동적 생성 -->
  </div>

  <div class="p2-bottom" id="p2-btns" style="display:none">
    <button class="btn-sv" onclick="doSave()">💾 저장</button>
    <button class="btn-sd" onclick="doFinalSend()">📤 발송</button>
  </div>

</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
// ── 직원 데이터 (Apps Script에서 동적 로드) ──────────────────────
var STAFF=[];

// ── 설정 ──────────────────────
var APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbxE7-FIN5Ne39-SOStT8gfByF8o-L4B8fxmIHABF5tCPDd_M6wA9VnMV-9vhNMMtUgw/exec';
var APPS_SCRIPT_TOKEN='thehim2026';

// ── 상태 ──────────────────────
var profile=null,files=[],voiceOn=false,mediaRec=null,editMode=false;
var now=new Date();
var days=['일','월','화','수','목','금','토'];
var dateStr=now.getFullYear()+'-'+p2(now.getMonth()+1)+'-'+p2(now.getDate());
var dateLabel=dateStr+'('+days[now.getDay()]+')';
function p2(n){return String(n).padStart(2,'0')}

// ── 초기화 ──────────────────────
(function(){ loadStaff(); })();

function loadStaff(){
  var list=document.getElementById('staff-list');
  list.innerHTML='<div style="text-align:center;padding:30px;color:var(--ink3);font-size:13px;">🌿 직원 목록 불러오는 중...</div>';
  fetch(APPS_SCRIPT_URL+'?action=get_staff')
    .then(function(r){return r.json()})
    .then(function(data){
      if(!data.ok)throw new Error(data.error||'오류');
      STAFF=data.staff;
      buildStaffList();
      var s=localStorage.getItem('him_v4');
      if(s){
        try{
          var saved=JSON.parse(s);
          var found=STAFF.find(function(st){return st.email===saved.email});
          if(found){profile=found;initP1();goPage('p1')}
        }catch(e){}
      }
    })
    .catch(function(){
      list.innerHTML=
        '<div style="text-align:center;padding:30px;color:var(--brush-rose);font-size:13px;">'+
        '직원 목록을 불러오지 못했습니다.<br>네트워크를 확인해주세요.<br><br>'+
        '<button onclick="loadStaff()" style="padding:8px 16px;border-radius:8px;border:1px solid var(--line);background:white;cursor:pointer;font-family:inherit">다시 시도</button>'+
        '</div>';
    });
}

function buildStaffList(){
  var ul=document.getElementById('staff-list');
  ul.innerHTML='';
  STAFF.forEach(function(s){
    var d=document.createElement('div');
    d.className='staff-card';
    d.innerHTML=
      '<div class="staff-initial">'+s.name.charAt(0)+'</div>'+
      '<div class="staff-info"><div class="sname">'+s.name+' '+s.role+'</div>'+
      '<div class="sdept">'+s.dept+'</div></div>';
    d.onclick=function(){
      document.querySelectorAll('.staff-card').forEach(function(c){c.classList.remove('on')});
      d.classList.add('on');profile=s;
    };
    ul.appendChild(d);
  });
}

function completeSetup(){
  if(!profile){toast('본인을 선택해주세요');return}
  localStorage.setItem('him_v4',JSON.stringify(profile));
  initP1();goPage('p1');
}

function initP1(){
  document.getElementById('user-dot').textContent=profile.name.charAt(0);
  document.getElementById('user-name').textContent=profile.name+' '+profile.role+' · '+profile.dept;
  document.getElementById('user-date').textContent=dateLabel+' 일일보고';
  loadContext();
}

function loadContext(){
  if(!profile)return;
  document.getElementById('ctx-loading').style.display='block';

  fetch(APPS_SCRIPT_URL+'?action=get_context&name='+encodeURIComponent(profile.name)+'&grade='+encodeURIComponent(profile.grade))
    .then(function(r){return r.json()})
    .then(function(data){
      document.getElementById('ctx-loading').style.display='none';
      if(!data.ok)return;
      renderContextCards(data);
    })
    .catch(function(){
      document.getElementById('ctx-loading').style.display='none';
    });
}

function renderContextCards(data){
  var yesterday=data.yesterday||[];
  var directive=data.directive||[];
  var generatedDate=data.generated_date||'';

  if(yesterday.length>0){
    var yEl=document.getElementById('ctx-yesterday');
    var yBody=document.getElementById('ctx-yesterday-body');
    yEl.style.display='block';
    if(generatedDate){
      var head=yEl.querySelector('.ctx-head span');
      if(head)head.textContent='어제 보고 요약 ('+generatedDate+' 브리핑)';
    }
    yesterday.forEach(function(item){
      var d=document.createElement('div');
      var text=typeof item==='string'?item:(item.text||item);
      var color=typeof item==='object'&&item.color?item.color:'green';
      d.className='ctx-row '+color;
      d.textContent=text;
      yBody.appendChild(d);
    });
  }

  if(directive.length>0){
    var dEl=document.getElementById('ctx-directive');
    var dBody=document.getElementById('ctx-directive-body');
    dEl.style.display='block';
    directive.forEach(function(item){
      var d=document.createElement('div');
      var text=typeof item==='string'?item:('['+item.from+'] '+item.content);
      var color=typeof item==='object'&&item.urgency==='high'?'rose':(item.color||'gold');
      d.className='ctx-row '+color;
      d.textContent=text;
      dBody.appendChild(d);
    });
  }
}

function resetProfile(){
  if(!confirm('다른 직원으로 변경할까요?'))return;
  localStorage.removeItem('him_v4');
  profile=null;files=[];
  document.getElementById('file-chips').innerHTML='';
  document.getElementById('main-input').value='';
  goPage('p0');loadStaff();
}

// ── 파일 ──────────────────────
function handleFiles(inp){
  Array.from(inp.files).forEach(function(f){
    if(files.find(function(x){return x.name===f.name}))return;
    files.push(f);
    var ext=f.name.split('.').pop().toLowerCase();
    var icons={pdf:'📄',xlsx:'📊',xls:'📊',doc:'📝',docx:'📝',hwp:'📝',png:'🖼',jpg:'🖼',jpeg:'🖼',mp3:'🎵',m4a:'🎵',wav:'🎵'};
    var chips=document.getElementById('file-chips');
    var c=document.createElement('div');
    c.className='file-chip';c.id='chip-'+f.name;
    c.innerHTML='<span>'+(icons[ext]||'📎')+' '+f.name+'</span><button class="chip-del" onclick="rmFile(\''+f.name+'\')">✕</button>';
    chips.appendChild(c);
  });
  inp.value='';
}
function rmFile(name){
  files=files.filter(function(f){return f.name!==name});
  var c=document.getElementById('chip-'+name);
  if(c)c.remove();
}

// ── 음성 ──────────────────────
function toggleVoice(){voiceOn?stopV():startV()}
function startV(){
  if(!navigator.mediaDevices){toast('이 기기에서 지원되지 않습니다');return}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    voiceOn=true;
    document.getElementById('voice-btn').classList.add('rec');
    document.getElementById('voice-icon').textContent='⏹';
    document.getElementById('voice-label').textContent='녹음 중 — 누르면 완료';
    var chunks=[];
    mediaRec=new MediaRecorder(stream);
    mediaRec.ondataavailable=function(e){chunks.push(e.data)};
    mediaRec.onstop=function(){
      var blob=new Blob(chunks,{type:'audio/webm'});
      var fname='음성_'+p2(now.getHours())+p2(now.getMinutes())+'.webm';
      var f=new File([blob],fname);
      files.push(f);
      var chips=document.getElementById('file-chips');
      var c=document.createElement('div');
      c.className='file-chip';c.id='chip-'+fname;
      c.innerHTML='<span>🎤 '+fname+'</span><button class="chip-del" onclick="rmFile(\''+fname+'\')">✕</button>';
      chips.appendChild(c);
      stream.getTracks().forEach(function(t){t.stop()});
      toast('🎤 녹음 완료');
    };
    mediaRec.start();
  }).catch(function(){toast('마이크 권한을 허용해주세요')});
}
function stopV(){
  voiceOn=false;
  document.getElementById('voice-btn').classList.remove('rec');
  document.getElementById('voice-icon').textContent='🎤';
  document.getElementById('voice-label').textContent='음성으로 말하기';
  if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();
}

// ── 분석 → P2 ──────────────────────
function doAnalyze(){
  var txt=document.getElementById('main-input').value.trim();
  if(!txt&&files.length===0){toast('업무 내용을 입력하거나 파일을 첨부해주세요');return}
  goPage('p2');
  document.getElementById('p2-name').textContent='분석 중...';
  document.getElementById('edit-btn').style.display='none';
  document.getElementById('p2-btns').style.display='none';
  document.getElementById('p2-body').innerHTML=
    '<div class="loading-wrap">'+
      '<div class="loading-brush">🖌️</div>'+
      '<div class="loading-text">힘클로드가 정리하고 있습니다</div>'+
      '<div class="loading-sub">프로젝트·인물·요청사항을<br>분리하는 중...</div>'+
    '</div>';

  var rawText=txt;
  var fileNames=files.map(function(f){return f.name});

  // 실제 환경: sendPrompt로 힘클로드 호출
  // 시연: 1.5초 후 결과 렌더
  setTimeout(function(){renderReport(rawText,fileNames)},1500);
}

function renderReport(raw,fnames){
  document.getElementById('p2-name').textContent=profile.name+' 보고서';
  document.getElementById('edit-btn').style.display='block';
  document.getElementById('p2-btns').style.display='flex';

  var lines=raw?raw.split('\n').filter(function(l){return l.trim()}).map(function(l){return l.trim()}):[];

  var html='<div class="report-wrap">';

  // 작성자
  html+=repCard('info','작성자',
    '<div class="rep-text">'+profile.name+' '+profile.role+' · '+profile.dept+'<br>'+dateLabel+'</div>');

  // 업무 내용
  if(lines.length>0){
    var taskHtml='';
    lines.forEach(function(l){taskHtml+='<div class="rep-task">'+l+'</div>'});
    html+=repCard('tasks','오늘 업무',taskHtml);
  }

  // 첨부파일
  if(fnames.length>0){
    var fHtml='';
    fnames.forEach(function(f){fHtml+='<div class="rep-task">📎 '+f+'</div>'});
    html+=repCard('files','첨부 파일',fHtml);
  }

  // AI 확인 질문 (파일 있을 때)
  if(fnames.length>0){
    html+=
      '<div class="ai-card">'+
        '<div class="ai-head">🤖 확인이 필요합니다</div>'+
        '<div class="ai-body">'+
          '<div class="ai-question">첨부된 <strong>'+fnames[0]+'</strong> 파일은 어떤 내용인가요?<br>한 줄로 설명해주세요.</div>'+
          '<input class="ai-input" id="ai-ans" placeholder="예) 더케이호텔 3월 거래내역">'+
          '<button class="ai-submit" onclick="submitAns()">확인 →</button>'+
        '</div>'+
      '</div>';
  }

  html+='</div>';
  document.getElementById('p2-body').innerHTML=html;
}

function repCard(id,label,bodyHtml){
  return '<div class="rep-card" id="card-'+id+'">'+
    '<div class="rep-head">'+
      '<span class="rep-label">'+label+'</span>'+
      '<button class="rep-edit" onclick="editCard(\''+id+'\')">수정</button>'+
    '</div>'+
    '<div class="rep-body" id="body-'+id+'">'+bodyHtml+'</div>'+
  '</div>';
}

function submitAns(){
  var ans=document.getElementById('ai-ans');
  if(!ans||!ans.value.trim()){toast('내용을 입력해주세요');return}
  document.querySelector('.ai-card').style.opacity='.5';
  document.querySelector('.ai-card').style.pointerEvents='none';
  toast('✅ 반영됐습니다');
}

var editMode=false;
function toggleEdit(){
  editMode=!editMode;
  var btn=document.getElementById('edit-btn');
  btn.textContent=editMode?'완료':'수정';
  btn.className=editMode?'edit-btn active':'edit-btn';
  document.querySelectorAll('.rep-edit').forEach(function(b){
    b.style.display=editMode?'block':'none';
  });
  if(!editMode)toast('저장됐습니다');
}

function editCard(id){
  var body=document.getElementById('body-'+id);
  var ta=body.querySelector('textarea');
  if(ta){
    var t=body.querySelector('.rep-text');
    if(t)t.textContent=ta.value;
    else{
      var tasks=body.querySelectorAll('.rep-task');
      tasks.forEach(function(el){el.remove()});
      ta.value.split('\n').filter(function(l){return l.trim()}).forEach(function(l){
        var d=document.createElement('div');d.className='rep-task';d.textContent=l;
        body.insertBefore(d,ta);
      });
    }
    ta.style.display='none';
    body.querySelector('.rep-save').style.display='none';
    toast('✅ 수정됐습니다');
    return;
  }
  var existing=body.innerHTML;
  var text='';
  body.querySelectorAll('.rep-text,.rep-task').forEach(function(el){text+=el.innerText+'\n'});
  var newTa=document.createElement('textarea');
  newTa.className='rep-textarea';newTa.rows=4;newTa.value=text.trim();
  newTa.style.display='block';
  var btn=document.createElement('button');
  btn.className='rep-save';btn.style.display='block';
  btn.textContent='저장';btn.onclick=function(){editCard(id)};
  body.appendChild(newTa);body.appendChild(btn);
  newTa.focus();
}

// ── 저장 / 발송 ──────────────────────
function doSave(){
  var blob=new Blob([document.documentElement.outerHTML],{type:'text/html;charset=utf-8'});
  var a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=dateStr.replace(/-/g,'')+'_일일보고_'+profile.name+'.html';
  a.click();toast('💾 저장됐습니다');
}

function doFinalSend(){
  var txt=document.getElementById('main-input').value.trim();
  var fnames=files.map(function(f){return f.name}).join(', ');
  var dc=dateStr.replace(/-/g,'');

  if(!txt){toast('보고 내용을 입력해주세요');return;}

  document.getElementById('p2-body').innerHTML=
    '<div class="done-wrap">'+
      '<div class="done-brush">📤</div>'+
      '<div class="done-title">발송 중...</div>'+
    '</div>';
  document.getElementById('p2-btns').style.display='none';
  document.getElementById('edit-btn').style.display='none';

  var body=
    '[일일보고] '+profile.name+' '+profile.role+' ('+profile.dept+') | '+dateLabel+'\n'+
    '━━━━━━━━━━━━━━━━━━━━━\n\n'+
    txt+
    (fnames?'\n\n【첨부】\n'+fnames:'')+
    '\n\n━━━━━━━━━━━━━━━━━━━━━\n'+
    '더힘이엔씨(주) | '+profile.name+' '+profile.role+' | '+dateStr+'\n'+
    '자동 생성: 힘클로드 v4.1';

  fetch(APPS_SCRIPT_URL,{
    method:'POST',
    mode:'no-cors',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify({
      token:APPS_SCRIPT_TOKEN,
      action:'send_daily_report',
      name:profile.name,
      role:profile.role,
      dept:profile.dept,
      grade:profile.grade,
      date:dateStr,
      to:'luri7305@gmail.com',
      cc:'taesilkim2@gmail.com',
      subject:'[일일보고] '+profile.name+'_'+dc,
      body:body,
      raw:txt
    })
  }).then(function(){
    document.getElementById('p2-body').innerHTML=
      '<div class="done-wrap">'+
        '<div class="done-brush">✅</div>'+
        '<div class="done-title">발송 완료</div>'+
        '<div class="done-desc">'+profile.name+' '+profile.role+'님의 보고서가<br>luri7305@gmail.com으로 전송됐습니다.</div>'+
        '<button class="done-new" onclick="newRep()">새 보고서 작성</button>'+
      '</div>';
  }).catch(function(err){
    document.getElementById('p2-body').innerHTML=
      '<div class="done-wrap">'+
        '<div class="done-brush">❌</div>'+
        '<div class="done-title">오류 발생</div>'+
        '<div class="done-desc">다시 시도해주세요.<br>'+err+'</div>'+
      '</div>';
    document.getElementById('p2-btns').style.display='flex';
    document.getElementById('edit-btn').style.display='block';
  });
}

function newRep(){
  document.getElementById('main-input').value='';
  files=[];document.getElementById('file-chips').innerHTML='';
  goPage('p1');
}

// ── 유틸 ──────────────────────
function goPage(id){
  document.querySelectorAll('.page').forEach(function(p){p.classList.remove('on')});
  document.getElementById(id).classList.add('on');
  window.scrollTo(0,0);
}
function toast(m){
  var t=document.getElementById('toast');
  t.textContent=m;t.classList.add('on');
  setTimeout(function(){t.classList.remove('on')},2500);
}
</script>
</body>
</html>
